<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ダイヤグラム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            overflow: hidden;
            height: 100vh;
        }

        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .toolbar h1 {
            font-size: 18px;
            color: white;
            white-space: nowrap;
        }

        .toolbar a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .toolbar a:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.7);
        }

        .toolbar select,
        .toolbar input[type="date"] {
            padding: 6px 12px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            cursor: pointer;
        }

        .toolbar select option {
            color: #333;
            background: white;
        }

        .toolbar input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        .toolbar .direction-btn {
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.2s;
        }

        .toolbar .direction-btn.active {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            border-color: white;
        }

        .toolbar .direction-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .toolbar .schedule-type-btn {
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.2s;
        }

        .toolbar .schedule-type-btn.active {
            background: rgba(255, 200, 50, 0.4);
            color: white;
            border-color: rgba(255, 200, 50, 0.8);
        }

        .toolbar .schedule-type-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .toolbar .zoom-controls {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }

        .toolbar .zoom-controls button {
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: white;
            transition: all 0.2s;
        }

        .toolbar .zoom-controls button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .toolbar .zoom-level {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            align-self: center;
            min-width: 40px;
            text-align: center;
        }

        .toolbar .zoom-axis-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            align-self: center;
            line-height: 1;
        }

        .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            cursor: grab;
            touch-action: none;
        }

        .canvas-container.grabbing {
            cursor: grabbing;
        }

        .canvas-container canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .hint {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.8);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>

<body>
    <div class="toolbar" id="toolbar">
        <a href="index.html">← 時刻表に戻る</a>
        <h1>📊 ダイヤグラム</h1>
        <select id="routeSelect">
            <option value="">路線を選択</option>
        </select>
        <div style="display: flex; gap: 4px;">
            <button class="direction-btn" data-dir="下り">下り</button>
            <button class="direction-btn" data-dir="上り">上り</button>
            <button class="direction-btn" data-dir="上下">上下</button>
        </div>
        <div style="display: flex; gap: 4px;">
            <button class="schedule-type-btn active" data-type="全て">全て</button>
            <button class="schedule-type-btn" data-type="平日">平日</button>
            <button class="schedule-type-btn" data-type="休日">休日</button>
        </div>
        <input type="date" id="dateFilter">
        <div class="zoom-controls">
            <span class="zoom-axis-label">↔</span>
            <button onclick="zoomXBy(-0.25)" title="時間軸を縮小">−</button>
            <span class="zoom-level" id="zoomLevelX">100%</span>
            <button onclick="zoomXBy(0.25)" title="時間軸を拡大">＋</button>
            <span class="zoom-axis-label" style="margin-left:6px">↕</span>
            <button onclick="zoomYBy(-0.25)" title="駅間を縮小">−</button>
            <span class="zoom-level" id="zoomLevelY">100%</span>
            <button onclick="zoomYBy(0.25)" title="駅間を拡大">＋</button>
            <button onclick="resetView()" title="リセット">⟳</button>
        </div>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <canvas id="diagramCanvas"></canvas>
    </div>

    <div class="hint" id="hint">ドラッグで移動 · スクロール: 縮尺 · Ctrl+スクロール: 時間軸 · Shift+スクロール: 駅間</div>

    <script>
        // --- State ---
        let stationsData = [];
        let trainsData = [];
        let currentRoute = '';
        let currentDirection = '上下';
        let currentScheduleType = '全て';

        // --- View transform ---
        let scale = 1;
        let userScaleX = 1; // extra horizontal (time axis) stretch
        let userScaleY = 1; // extra vertical (station spacing) stretch
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let dragStartOffsetX = 0;
        let dragStartOffsetY = 0;

        // Pinch state
        let lastPinchDist = 0;
        let lastPinchCenterX = 0;
        let lastPinchCenterY = 0;

        // Offscreen canvas cache
        let offCanvas = null;
        let offCtx = null;
        let offScaleX = 1; // X scale at which offscreen was rendered
        let offScaleY = 1; // Y scale at which offscreen was rendered
        let cachedDiagramData = null;
        let renderPending = false;
        let hqTimer = null; // debounce timer for high-quality re-render

        // --- Init ---
        document.addEventListener('DOMContentLoaded', async function () {
            setupControls();
            setupPanZoom();
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                blitToScreen();
            });
            await loadCSVFiles();

            setTimeout(() => {
                document.getElementById('hint').style.opacity = '0';
            }, 3000);
        });

        function resizeCanvas() {
            const canvas = document.getElementById('diagramCanvas');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        }

        // --- CSV Loading ---

        function parseCSV(text) {
            return text.trim().split('\n').map(line => {
                const values = [];
                let current = '';
                let inQuotes = false;
                for (let char of line.replace(/\r$/, '')) {
                    if (char === '"') { inQuotes = !inQuotes; }
                    else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
                    else { current += char; }
                }
                values.push(current.trim());
                return values;
            });
        }

        function parseStationCSV(text) {
            return parseCSV(text)
                .filter(l => l.length >= 4 && l[0] && l[1])
                .map(l => ({ route: l[0], direction: l[1], order: parseInt(l[2]) || 0, station: l[3], distance: l.length >= 5 ? parseFloat(l[4]) || 0 : null }))
                .sort((a, b) => a.order - b.order);
        }

        function parseTrainCSV(text) {
            return parseCSV(text)
                .filter(l => l.length >= 10 && l[0] && l[2])
                .map(l => ({ route: l[0], direction: l[1], trainNumber: l[2], trainName: l[3], origin: l[4], originTime: l[5], operationDay: l[6], station: l[7], type: l[8], time: l[9] }));
        }

        async function loadCSVFiles() {
            try {
                const sRes = await fetch('stations.csv');
                if (!sRes.ok) return;
                stationsData = parseStationCSV(await sRes.text());

                // 路線ごとの列車CSVをdata/ディレクトリから読み込み
                const routes = [...new Set(stationsData.map(s => s.route))];
                trainsData = [];
                await Promise.all(routes.map(async (route) => {
                    try {
                        const res = await fetch(`data/${encodeURIComponent(route)}.csv`);
                        if (res.ok) {
                            const text = await res.text();
                            if (text.trim()) trainsData.push(...parseTrainCSV(text));
                        }
                    } catch (e) { }
                }));

                updateRouteSelect();
            } catch (e) { }
        }

        // --- Operation Day Matching ---

        function matchesSingleCondition(cond, date, dayOfWeek, isWeekend) {
            if (cond === '毎日') return true;
            if (cond === '平日') return !isWeekend;
            if (cond === '土休日' || cond === '休日') return isWeekend;
            if (cond === '土曜') return dayOfWeek === 6;
            if (cond === '日曜' || cond === '祝日') return dayOfWeek === 0;
            const rm = cond.match(/^(\d{1,4}\/\d{1,2}\/\d{1,2}|\d{1,2}\/\d{1,2})-(\d{1,4}\/\d{1,2}\/\d{1,2}|\d{1,2}\/\d{1,2})$/);
            if (rm) {
                const s = parseDateSpec(rm[1], date.getFullYear()), e = parseDateSpec(rm[2], date.getFullYear());
                if (s && e) return e < s ? (date >= s || date <= e) : (date >= s && date <= e);
            }
            const sm = cond.match(/^(\d{1,4}\/\d{1,2}\/\d{1,2}|\d{1,2}\/\d{1,2})$/);
            if (sm) {
                const t = parseDateSpec(sm[1], date.getFullYear());
                if (t) return date.getFullYear() === t.getFullYear() && date.getMonth() === t.getMonth() && date.getDate() === t.getDate();
            }
            return null;
        }

        function matchesOperationDay(operationDay, dateStr) {
            if (!dateStr || !operationDay) return true;
            const date = new Date(dateStr);
            const dow = date.getDay();
            const isWeekend = (dow === 0 || dow === 6);
            const allConds = operationDay.split('|').map(s => s.trim());
            const includes = [], excludes = [];
            allConds.forEach(c => { if (c.startsWith('!')) excludes.push(c.substring(1)); else includes.push(c); });
            if (excludes.some(c => matchesSingleCondition(c, date, dow, isWeekend) === true)) return false;
            if (includes.length === 0) return true;
            return includes.some(c => { const r = matchesSingleCondition(c, date, dow, isWeekend); return r === null ? true : r; });
        }

        function parseDateSpec(spec, defaultYear) {
            const p = spec.split('/');
            return p.length === 3 ? new Date(+p[0], +p[1] - 1, +p[2]) : p.length === 2 ? new Date(defaultYear, +p[0] - 1, +p[1]) : null;
        }

        function matchesScheduleType(operationDay, scheduleType) {
            if (scheduleType === '全て') return true;
            if (!operationDay) return true;
            const allConds = operationDay.split('|').map(s => s.trim());
            const includes = allConds.filter(c => !c.startsWith('!'));
            if (includes.length === 0) return true;
            for (const cond of includes) {
                if (cond === '毎日') return true;
                if (scheduleType === '平日' && cond === '平日') return true;
                if (scheduleType === '休日' && (cond === '休日' || cond === '土休日')) return true;
            }
            const dayKeywords = ['毎日', '平日', '休日', '土休日', '土曜', '日曜', '祝日'];
            const hasKnownType = includes.some(c => dayKeywords.includes(c));
            if (!hasKnownType) return true;
            return false;
        }

        function getFilteredTrains(direction) {
            const dateStr = document.getElementById('dateFilter').value;
            const filtered = trainsData.filter(t => t.route === currentRoute && t.direction === direction);
            const keys = [...new Set(filtered.map(t => t.trainNumber + '\t' + t.operationDay))];
            return keys.map(k => { const sep = k.indexOf('\t'); const n = k.substring(0, sep); const od = k.substring(sep + 1); const i = filtered.find(t => t.trainNumber === n && t.operationDay === od); return { trainNumber: n, trainName: i.trainName, operationDay: i.operationDay, direction }; })
                .filter(t => {
                    if (dateStr) return matchesOperationDay(t.operationDay, dateStr);
                    return matchesScheduleType(t.operationDay, currentScheduleType);
                });
        }

        // --- Controls ---

        function setupControls() {
            document.getElementById('routeSelect').addEventListener('change', function () {
                currentRoute = this.value; updateDirectionButtons(); rebuildAndRender();
            });
            document.querySelectorAll('.direction-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    currentDirection = this.dataset.dir; updateDirectionButtons(); rebuildAndRender();
                });
            });
            document.querySelectorAll('.schedule-type-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    currentScheduleType = this.dataset.type;
                    updateScheduleTypeButtons();
                    // ダイヤ種別選択時は日付をクリア
                    if (currentScheduleType !== '全て') {
                        document.getElementById('dateFilter').value = '';
                    }
                    rebuildAndRender();
                });
            });
            document.getElementById('dateFilter').addEventListener('change', () => {
                // 日付指定時はダイヤ種別を「全て」に
                if (document.getElementById('dateFilter').value) {
                    currentScheduleType = '全て';
                    updateScheduleTypeButtons();
                }
                rebuildAndRender();
            });
            updateDirectionButtons();
            updateScheduleTypeButtons();
        }

        function updateRouteSelect() {
            const sel = document.getElementById('routeSelect');
            const routes = [...new Set(stationsData.map(s => s.route))];
            sel.innerHTML = '<option value="">路線を選択</option>' + routes.map(r => `<option value="${r}">${r}</option>`).join('');
            if (routes.length > 0 && !currentRoute) { currentRoute = routes[0]; sel.value = currentRoute; rebuildAndRender(); }
        }

        function updateDirectionButtons() {
            document.querySelectorAll('.direction-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.dir === currentDirection);
            });
        }

        function updateScheduleTypeButtons() {
            document.querySelectorAll('.schedule-type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === currentScheduleType);
            });
        }

        function getActiveDirections() {
            if (currentDirection === '上下') return ['下り', '上り'];
            return [currentDirection];
        }

        // --- Pan / Zoom ---

        function setupPanZoom() {
            const c = document.getElementById('canvasContainer');

            c.addEventListener('mousedown', e => {
                isDragging = true; dragStartX = e.clientX; dragStartY = e.clientY;
                dragStartOffsetX = offsetX; dragStartOffsetY = offsetY;
                c.classList.add('grabbing');
            });
            window.addEventListener('mousemove', e => {
                if (!isDragging) return;
                offsetX = dragStartOffsetX + (e.clientX - dragStartX);
                offsetY = dragStartOffsetY + (e.clientY - dragStartY);
                scheduleBlit();
            });
            window.addEventListener('mouseup', () => { isDragging = false; c.classList.remove('grabbing'); scheduleHQ(); });

            c.addEventListener('wheel', e => {
                e.preventDefault();
                const r = c.getBoundingClientRect();
                const mx = e.clientX - r.left, my = e.clientY - r.top;
                const delta = e.deltaY * 0.001;
                if (e.ctrlKey) {
                    // X-axis only (time axis)
                    const nsx = Math.max(0.1, Math.min(20, userScaleX * (1 - delta)));
                    const fx = nsx / userScaleX;
                    offsetX = mx - fx * (mx - offsetX);
                    userScaleX = nsx;
                    updateZoomLabel(); scheduleBlit(); scheduleHQ();
                } else if (e.shiftKey) {
                    // Y-axis only (station spacing)
                    const nsy = Math.max(0.1, Math.min(20, userScaleY * (1 - delta)));
                    const fy = nsy / userScaleY;
                    offsetY = my - fy * (my - offsetY);
                    userScaleY = nsy;
                    updateZoomLabel(); scheduleBlit(); scheduleHQ();
                } else {
                    // Uniform zoom
                    const ns = Math.max(0.1, Math.min(10, scale * (1 - delta)));
                    const f = ns / scale;
                    offsetX = mx - f * (mx - offsetX); offsetY = my - f * (my - offsetY);
                    scale = ns;
                    updateZoomLabel(); scheduleBlit(); scheduleHQ();
                }
            }, { passive: false });

            c.addEventListener('touchstart', e => {
                if (e.touches.length === 1) {
                    isDragging = true; dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
                    dragStartOffsetX = offsetX; dragStartOffsetY = offsetY;
                } else if (e.touches.length === 2) {
                    isDragging = false; lastPinchDist = getPinchDist(e.touches);
                    lastPinchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    lastPinchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                }
            }, { passive: false });

            c.addEventListener('touchmove', e => {
                e.preventDefault();
                if (e.touches.length === 1 && isDragging) {
                    offsetX = dragStartOffsetX + (e.touches[0].clientX - dragStartX);
                    offsetY = dragStartOffsetY + (e.touches[0].clientY - dragStartY);
                    scheduleBlit();
                } else if (e.touches.length === 2) {
                    const dist = getPinchDist(e.touches);
                    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    const f = dist / lastPinchDist;
                    const ns = Math.max(0.1, Math.min(10, scale * f));
                    const af = ns / scale;
                    offsetX = cx - af * (cx - offsetX) + (cx - lastPinchCenterX);
                    offsetY = cy - af * (cy - offsetY) + (cy - lastPinchCenterY);
                    scale = ns;
                    lastPinchDist = dist; lastPinchCenterX = cx; lastPinchCenterY = cy;
                    updateZoomLabel(); scheduleBlit();
                }
            }, { passive: false });

            c.addEventListener('touchend', () => { isDragging = false; scheduleHQ(); });
        }

        function getPinchDist(t) {
            const dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // Fast blit: just copy offscreen canvas to screen with transform
        function scheduleBlit() {
            if (renderPending) return;
            renderPending = true;
            requestAnimationFrame(() => { renderPending = false; blitToScreen(); });
        }

        // Debounced high-quality re-render at current zoom
        function scheduleHQ() {
            clearTimeout(hqTimer);
            hqTimer = setTimeout(() => {
                const vsx = scale * userScaleX, vsy = scale * userScaleY;
                if (cachedDiagramData && (Math.abs(offScaleX - vsx) > 0.01 || Math.abs(offScaleY - vsy) > 0.01)) {
                    renderOffscreen(vsx, vsy);
                    blitToScreen();
                }
            }, 200);
        }

        function zoomXBy(delta) {
            const cx = window.innerWidth / 2;
            const ns = Math.max(0.1, Math.min(20, userScaleX + delta));
            const f = ns / userScaleX;
            offsetX = cx - f * (cx - offsetX);
            userScaleX = ns;
            updateZoomLabel(); blitToScreen(); scheduleHQ();
        }

        function zoomYBy(delta) {
            const cy = window.innerHeight / 2;
            const ns = Math.max(0.1, Math.min(20, userScaleY + delta));
            const f = ns / userScaleY;
            offsetY = cy - f * (cy - offsetY);
            userScaleY = ns;
            updateZoomLabel(); blitToScreen(); scheduleHQ();
        }

        function resetView() {
            const toolbarH = document.getElementById('toolbar').offsetHeight;
            scale = 1; userScaleX = 1; userScaleY = 1;
            offsetX = 0; offsetY = toolbarH;
            updateZoomLabel();
            renderOffscreen(1, 1);
            blitToScreen();
        }

        function updateZoomLabel() {
            document.getElementById('zoomLevelX').textContent = Math.round(userScaleX * 100) + '%';
            document.getElementById('zoomLevelY').textContent = Math.round(userScaleY * 100) + '%';
        }

        // --- Diagram Data ---

        function timeToMinutes(t) {
            if (!t || t === 'レ') return null;
            const s = String(t).padStart(4, '0');
            return parseInt(s.substring(0, 2)) * 60 + parseInt(s.substring(2, 4));
        }

        function rebuildAndRender() {
            rebuildDiagramData();
            if (cachedDiagramData) {
                renderOffscreen(scale * userScaleX, scale * userScaleY);
                resetView();
            } else {
                offCanvas = null;
                blitToScreen();
            }
        }

        function rebuildDiagramData() {
            if (!currentRoute || !currentDirection) { cachedDiagramData = null; return; }

            const activeDirections = getActiveDirections();

            // Always use 下り stations as the canonical Y-axis order
            const baseDirection = '下り';
            const stations = stationsData.filter(s => s.route === currentRoute && s.direction === baseDirection).sort((a, b) => a.order - b.order);
            if (stations.length === 0) { cachedDiagramData = null; return; }

            // Build a station-name → index map based on 下り order
            const si = {}; stations.forEach((s, i) => { si[s.station] = i; });

            // Collect filtered trains for each active direction
            const allTrainLines = [];
            let minT = Infinity, maxT = -Infinity;

            // Color palettes: blue family for 下り, red/orange family for 上り
            const downColors = ['#1e88e5', '#0288d1', '#00acc1', '#00897b', '#039be5', '#3949ab', '#5e35b1', '#1565c0', '#0277bd', '#006064'];
            const upColors = ['#e53935', '#f4511e', '#fb8c00', '#d81b60', '#8e24aa', '#c0392b', '#bf360c', '#e65100', '#ad1457', '#6a1493'];

            activeDirections.forEach(dir => {
                const ft = getFilteredTrains(dir);
                const ftKeys = ft.map(t => t.trainNumber + '\t' + t.operationDay);
                const trainEntries = trainsData.filter(t => t.route === currentRoute && t.direction === dir && ftKeys.includes(t.trainNumber + '\t' + t.operationDay));

                trainEntries.forEach(t => { const m = timeToMinutes(t.time); if (m !== null) { minT = Math.min(minT, m); maxT = Math.max(maxT, m); } });

                const palette = dir === '下り' ? downColors : upColors;

                ft.forEach((train, idx) => {
                    const entries = trainEntries.filter(e => e.trainNumber === train.trainNumber && e.operationDay === train.operationDay);
                    const st = {};
                    entries.forEach(e => {
                        if (e.time === 'レ') return;
                        const m = timeToMinutes(e.time); if (m === null) return;
                        if (si[e.station] === undefined) return;
                        if (!st[e.station]) st[e.station] = {};
                        st[e.station][e.type] = m;
                    });
                    allTrainLines.push({ dir, trainNumber: train.trainNumber, label: entries[0]?.trainName || '', color: palette[idx % palette.length], st });
                });
            });

            if (minT === Infinity) { cachedDiagramData = null; return; }

            minT = Math.floor(minT / 60) * 60;
            maxT = Math.ceil(maxT / 60) * 60;

            const mL = 100, mR = 40, mT = 50, mB = 40, ppm = 6;
            const hasDist = stations.every(s => s.distance !== null && s.distance !== undefined);
            let ppk, pH;
            if (hasDist) {
                const td = stations[stations.length - 1].distance - stations[0].distance;
                ppk = td > 0 ? Math.max(0.5, 2000 / td) : 1;
                pH = td * ppk;
            } else {
                pH = (stations.length - 1) * 40;
            }
            const pW = (maxT - minT) * ppm;

            const sY = stations.map((s, i) => {
                if (hasDist) return mT + (s.distance - stations[0].distance) * ppk;
                return mT + i * (pH / Math.max(1, stations.length - 1));
            });
            const tX = m => mL + (m - minT) * ppm;

            // Build final train lines now that sY/tX are available
            const trainLines = [];
            allTrainLines.forEach(train => {
                const pts = [];
                // For 下り: iterate stations in 下り order (top→bottom = start→end)
                // For 上り: iterate stations in reverse order (bottom→top = start→end)
                const stationOrder = train.dir === '上り' ? [...stations].reverse() : stations;
                stationOrder.forEach(s => {
                    const t = train.st[s.station]; if (!t) return;
                    const yIdx = si[s.station];
                    if (t['着'] !== undefined) pts.push({ x: tX(t['着']), y: sY[yIdx] });
                    if (t['発'] !== undefined) pts.push({ x: tX(t['発']), y: sY[yIdx] });
                });
                if (pts.length < 2) return;
                trainLines.push({ points: pts, color: train.color, trainNumber: train.trainNumber, label: train.label, dir: train.dir });
            });

            cachedDiagramData = { stations, sY, minT, maxT, mL, mR, mT, mB, pW, pH, ppm, trainLines, tX, activeDirections };
        }

        // --- Offscreen Rendering: vector lines + fixed-size text ---

        function renderOffscreen(atScaleX, atScaleY) {
            if (!cachedDiagramData) return;
            const d = cachedDiagramData;
            const dpr = window.devicePixelRatio || 1;
            const logW = d.mL + d.pW + d.mR;
            const logH = d.mT + d.pH + d.mB;

            // Canvas size = logical * scale * dpr (non-uniform)
            let useSX = atScaleX, useSY = atScaleY;
            const cw0 = Math.ceil(logW * useSX * dpr);
            const ch0 = Math.ceil(logH * useSY * dpr);
            const maxDim = 8192;
            if (cw0 > maxDim || ch0 > maxDim) {
                const r = Math.min(maxDim / cw0, maxDim / ch0);
                useSX *= r; useSY *= r;
            }
            const cw = Math.ceil(logW * useSX * dpr);
            const ch = Math.ceil(logH * useSY * dpr);

            if (!offCanvas) offCanvas = document.createElement('canvas');
            offCanvas.width = cw;
            offCanvas.height = ch;
            offCtx = offCanvas.getContext('2d');
            offScaleX = useSX;
            offScaleY = useSY;

            // Non-uniform transform: logical coords -> physical pixels
            // Lines and fills are drawn in this space (vector quality)
            const setVS = () => offCtx.setTransform(useSX * dpr, 0, 0, useSY * dpr, 0, 0);
            // Text space: draw at DPR-only scale, positions pre-multiplied
            const setTS = () => offCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            // Logical -> offscreen CSS pixel position for text placement
            const px = x => x * useSX;
            const py = y => y * useSY;

            // Background
            setVS();
            offCtx.fillStyle = '#ffffff';
            offCtx.fillRect(0, 0, logW, logH);

            // Grid: horizontal station lines
            offCtx.strokeStyle = '#e0e0e0';
            offCtx.lineWidth = 1 / useSY;  // ~1px on screen
            d.stations.forEach((s, i) => {
                offCtx.beginPath(); offCtx.moveTo(d.mL, d.sY[i]); offCtx.lineTo(d.mL + d.pW, d.sY[i]); offCtx.stroke();
            });

            // Grid: vertical time lines
            for (let t = d.minT; t <= d.maxT; t += 10) {
                const x = d.tX(t);
                if (t % 60 === 0) { offCtx.strokeStyle = '#bbb'; offCtx.lineWidth = 1.5 / useSX; }
                else { offCtx.strokeStyle = '#e8e8e8'; offCtx.lineWidth = 0.5 / useSX; }
                offCtx.beginPath(); offCtx.moveTo(x, d.mT); offCtx.lineTo(x, d.mT + d.pH); offCtx.stroke();
            }

            // Train lines
            d.trainLines.forEach(train => {
                offCtx.strokeStyle = train.color;
                offCtx.lineWidth = 1.5 / Math.min(useSX, useSY); // ~1.5px on screen
                offCtx.beginPath(); offCtx.moveTo(train.points[0].x, train.points[0].y);
                for (let i = 1; i < train.points.length; i++) offCtx.lineTo(train.points[i].x, train.points[i].y);
                offCtx.stroke();
            });

            // === Text (fixed size regardless of zoom) ===
            setTS();

            // Station labels
            offCtx.fillStyle = '#333';
            offCtx.font = '12px -apple-system, sans-serif';
            offCtx.textAlign = 'right';
            offCtx.textBaseline = 'middle';
            d.stations.forEach((s, i) => {
                offCtx.fillText(s.station, px(d.mL - 8), py(d.sY[i]));
            });

            // Time labels
            offCtx.textAlign = 'center'; offCtx.textBaseline = 'bottom';
            for (let t = d.minT; t <= d.maxT; t += 30) {
                const isHour = (t % 60 === 0);
                offCtx.font = isHour ? 'bold 12px -apple-system, sans-serif' : '10px -apple-system, sans-serif';
                offCtx.fillStyle = isHour ? '#333' : '#888';
                const label = `${Math.floor(t / 60)}:${String(t % 60).padStart(2, '0')}`;
                offCtx.fillText(label, px(d.tX(t)), py(d.mT - 5));
            }

            // Train number labels at the start of each line
            offCtx.font = 'bold 9px -apple-system, sans-serif';
            offCtx.textAlign = 'left'; offCtx.textBaseline = 'bottom';
            d.trainLines.forEach(train => {
                const labelText = train.trainNumber;
                const textW = offCtx.measureText(labelText).width;
                const lx = px(train.points[0].x) + 2;
                const ly = py(train.points[0].y) - 2;
                offCtx.fillStyle = 'rgba(255,255,255,0.85)';
                offCtx.fillRect(lx - 1, ly - 10, textW + 2, 11);
                offCtx.fillStyle = train.color;
                offCtx.fillText(labelText, lx, ly);
            });

            // Legend (only in 上下 mode)
            if (d.activeDirections && d.activeDirections.length > 1) {
                const legendItems = [
                    { label: '下り', color: '#1e88e5' },
                    { label: '上り', color: '#e53935' }
                ];
                const lPad = 10, lItemH = 18, lW = 72, lH = lPad * 2 + legendItems.length * lItemH;
                const lx = px(d.mL + d.pW) - lW - 8, ly = py(d.mT) + 8;
                offCtx.fillStyle = 'rgba(255,255,255,0.88)';
                offCtx.strokeStyle = '#ccc'; offCtx.lineWidth = 1;
                offCtx.beginPath(); offCtx.roundRect(lx, ly, lW, lH, 4); offCtx.fill(); offCtx.stroke();
                legendItems.forEach((item, i) => {
                    const iy = ly + lPad + i * lItemH + lItemH / 2;
                    offCtx.fillStyle = item.color;
                    offCtx.fillRect(lx + lPad, iy - 2, 16, 3);
                    offCtx.fillStyle = '#333';
                    offCtx.font = '11px -apple-system, sans-serif';
                    offCtx.textAlign = 'left'; offCtx.textBaseline = 'middle';
                    offCtx.fillText(item.label, lx + lPad + 22, iy);
                });
            }
        }

        // --- Screen Blit (ultra-fast, called on every pan/zoom frame) ---

        function blitToScreen() {
            const canvas = document.getElementById('diagramCanvas');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const w = window.innerWidth, h = window.innerHeight;

            if (canvas.width !== w * dpr || canvas.height !== h * dpr) {
                canvas.width = w * dpr; canvas.height = h * dpr;
                canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
            }

            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.fillStyle = '#f0f2f5';
            ctx.fillRect(0, 0, w, h);

            if (!offCanvas || !cachedDiagramData) return;

            // Draw cached offscreen bitmap, with per-axis relative scale for fast pan
            // (RelScale approaches 1.0 just before each HQ re-render fires)
            const relSX = (scale * userScaleX) / offScaleX;
            const relSY = (scale * userScaleY) / offScaleY;
            const dw = offCanvas.width / dpr * relSX;
            const dh = offCanvas.height / dpr * relSY;
            ctx.drawImage(offCanvas, offsetX, offsetY, dw, dh);
        }
    </script>
